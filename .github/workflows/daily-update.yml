name: Daily EDA Data Sync

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # ── Consume all 15 EDA data sources ──
      - name: Download EDDB drug data (mirror)
        run: |
          curl -L -o /tmp/egyptian-drugs.json \
            "https://raw.githubusercontent.com/karem505/egyptian-drug-database/main/data/egyptian-drugs.json"

      - name: Generate EDA drugs index
        run: node scripts/generate-eda-drugs.mjs /tmp/egyptian-drugs.json

      - name: Generate EDA supplement cross-reference
        run: node scripts/generate-eda-supplement.mjs /tmp/egyptian-drugs.json

      - name: Enrich missing data from cross-references
        run: node scripts/enrich-eda-data.mjs /tmp/egyptian-drugs.json

      - name: Health-check and consume all data sources
        run: node scripts/consume-all-sources.mjs

      # ── Validate generated data quality ──
      - name: Validate EDA data quality
        run: node scripts/validate-eda-data.mjs

      - name: Build
        run: npm run build

      - name: Commit and push if changed
        run: |
          git config user.name "EDA Sync Bot"
          git config user.email "actions@github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: daily EDA data sync [$(date +%Y-%m-%d)]"
            git push
          fi
